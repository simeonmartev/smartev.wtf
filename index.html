      <h1>Simeon Martev</h1>
      <p><strong>CTO of Identrics, Technical Architect, Data &amp; AI Systems Engineer</strong></p>
      <p>I have been building data pipelines for Media Intelligence and Risk Intelligence for over 15 years. Most of my
        work sits at the ingestion and enrichment layer - taking millions of documents a day from unstructured sources
        and turning them into something clean and searchable. I have built multilingual NLP pipelines, and I spend most
        of my time on the validation layer between models and storage - making sure raw entity output is
        confidence-scored before it reaches anything downstream.</p>
      <p>I work with LLMs to build enrichment agents - multi-provider model layers for classification, summarisation,
        and entity resolution at scale. I do my best work in the code, not just the diagram.</p>
